const logEl = document.getElementById('log');
function log(msg, type='') { logEl.innerHTML += `<span class="${type}">${msg}</span>\n`; logEl.scrollTop = logEl.scrollHeight; }

async function ins(table, data) {
  const r = await fetch(`${SUPA_URL}/${table}`, { method: 'POST', headers: H, body: JSON.stringify(data) });
  if (!r.ok) throw new Error(await r.text());
  return r.json();
}

function pd(s) {
  if (!s) return null;
  s = s.trim();
  if (!s || s === 'N/A' || s === 'N/A ') return null;
  const p = s.split('/');
  if (p.length !== 3) return null;
  let [d, m, y] = p;
  d = d.replace(/\D/g,'').slice(-2).padStart(2,'0');
  m = m.replace(/\D/g,'').slice(-2).padStart(2,'0');
  y = y.replace(/\D/g,'');
  if (y.length > 4) y = y.slice(-4);
  if (!d || !m || y.length < 4) return null;
  return `${y}-${m}-${d}`;
}

// ── IMPORTAÇÃO ───────────────────────────────────────────────
async function importar() {
  const btn = document.getElementById('btn');
  btn.disabled = true;
  log('Iniciando importação...', 'info');

  try {
    log('\n── TURMAS ──────────────────────', 'info');
    for (const t of turmasData) {
      try {
        await ins('turmas', t);
        log(`  ✓ ${t.nome}`, 'ok');
      } catch(e) { log(`  ✗ ${t.nome}: ${e.message}`, 'err'); }
    }

    log('\n── CANDIDATOS ──────────────────', 'info');
    for (const c of candidatosData) {
      try {
        await ins('candidatos', c);
        log(`  ✓ ${c.nome} (${c.turma_nome} · ${c.status})`, 'ok');
      } catch(e) { log(`  ✗ ${c.nome}: ${e.message}`, 'err'); }
    }

    log('\n── CUSTOS ──────────────────────', 'info');
    for (const c of custosData) {
      try {
        await ins('custos', c);
        log(`  ✓ ${c.candidato} — R$${c.total.toLocaleString('pt-BR')}`, 'ok');
      } catch(e) { log(`  ✗ ${c.candidato}: ${e.message}`, 'err'); }
    }

    log('\n✅ IMPORTAÇÃO CONCLUÍDA! Abra o portal para conferir.', 'ok');
  } catch(e) {
    log('\n✗ Erro inesperado: ' + e.message, 'err');
  }

  btn.textContent = '✓ Concluído';
}
